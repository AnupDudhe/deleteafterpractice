apiVersion:   apps/v1 
kind:   StatefulSet
metadata: 
  name:  dbapp
  labels:
    app:  dbapp
spec: 
   replicas: 3 
   template:
      metadata:
        labels:
          app:  dbapp
      spec:
        containers:
        - name:  dbapp
          image:  mysql:latest
          ports:
          - containerPort: 3306
          env:
          - name: MYSQL_ROOT_PASSWORD
            valueFrom:
               secretKeyRef:
                  name: dbsecret
                  key: dbkey
   selector:
      matchLabels:
        app:  dbapp