apiVersion: v1 
kind: Pod 
metadata: 
  name: nppod 
  labels:
    app: npapp
spec:  
   containers:  
     - name: nppod  
       image: nginx:latest
       ports:
          - containerPort: 80
---         
apiVersion:   v1  
kind:  Service
metadata: 
  name: np-service 
  labels:
    app: npapp
spec: 
  type: NodePort 
  selector:
    app: npapp
  ports:
    - protocol: TCP
      port: 80  #service
      targetPort: 80  #target port of the container