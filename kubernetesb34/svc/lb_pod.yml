apiVersion: v1 
kind: Pod 
metadata: 
  name: lbpod 
  labels:
    app: lbapp
spec:  
   containers:  
     - name: lbpod  
       image: nginx:latest
       ports:
          - containerPort: 80
---         
apiVersion:   v1  
kind:  Service
metadata: 
  name: lb-service 
  labels:
    app: lbapp
spec: 
  type: LoadBalancer 
  selector:
    app: lbapp
  ports:
    - protocol: TCP
      port: 80  #service
      targetPort: 80  #target port of the container