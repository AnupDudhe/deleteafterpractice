apiVersion:    apps/v1 
kind:   ReplicaSet
metadata:
   name: rs
   labels:
      app: rs
spec:
   replicas: 3
   selector: 
      matchLabels:
         app: rs   
   template:
      metadata: 
        name: nginxwebserver #metadata is the naming convention for object
        labels:
          app: rs      
      spec:  #details that required to create the object
        containers:  
          - name: nginx 
            image: nginx:latest
            ports:
                - containerPort: 80