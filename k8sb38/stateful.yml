apiVersion: apps/v1 
kind:  StatefulSet 
metadata: 
    name: ssdb
    lables:
       app: ssdb
spec:
  replicas: 3 
  template:
      metadata: 
          name: ssdb
          labels:
              app: ssdb
      spec:
         containers:
            - name:  ssdb 
              image:  mysql:latest   
              ports:
                - containerPort: 3306
                  protocol: TCP 
              env:
                 - name: MYSQL_ROOT_PASSWORD
                   value: "1234"
  selector:
    matchLabels: 
      app: ssdb    
              #docker run -d -P -e "MYSQL_ROOT_PASSWORD"="1234"