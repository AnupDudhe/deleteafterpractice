apiVersion:  networking.k8s.io/v1
kind: 
metadata:
     name: ingress
     annotations: 
        nginx.ingress.kubernetes.io/rewrite-target: /
spec: 
    ingressClassName: nginx
    rules:
       - host:  lb-endpoint  
         http:
           paths:
              - path:  /
                pathType: Prefix 
                backend:
                    service:
                       name: nginxappci 
                       port: 
                          number: 80 
              - path:  /tomcat
                pathType: Prefix 
                backend:
                    service:
                       name: tomcatapp-ci
                       port: 
                          number: 8080 