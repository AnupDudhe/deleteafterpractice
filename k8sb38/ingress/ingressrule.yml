apiVersion:  networking.k8s.io/v1
kind: Ingress
metadata:
     name: ingress
     annotations: 
        nginx.ingress.kubernetes.io/rewrite-target: /
spec: 
    ingressClassName: nginx
    rules:
       - host:  a4678d9f683cf4c4f8f76a1ad03d7c4b-377237074.us-east-1.elb.amazonaws.com
         http:
           paths:
              - path:  /
                pathType: Prefix 
                backend:
                    service:
                       name: nginxappci 
                       port: 
                          number: 80 
              - path:  /tomcat
                pathType: Prefix 
                backend:
                    service:
                       name: tomcatapp-ci
                       port: 
                          number: 8080 