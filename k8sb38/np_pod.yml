apiVersion:  v1 
kind: Pod
metadata: 
  name: nginxnp-pod 
  labels:
    app: nginxnp
spec: 
    containers:
       - image: nginx:latest 
         ports:
           - containerPort: 80
         name: nginxcont 
        
---
apiVersion:  v1 
kind: Service
metadata:
  name: nodeportsvc 
spec: 
    selector: 
       app: nginxnp
    type: NodePort 
    ports: 
         - protocol: TCP
           port: 80 #pod port
           targetPort: 80  #container port  
        
